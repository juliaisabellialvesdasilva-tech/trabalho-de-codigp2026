<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Interativa</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background-color: #f1f5f9;
    margin: 0;
  }

  header {
    background-color: #1e40af;
    color: white;
    padding: 20px;
  }

  section {
    padding: 40px;
  }

  button {
    padding: 15px;
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
  }

  .btn1 { background: #22c55e; color: white; }
  .btn2 { background: #ef4444; color: white; }
  .btn3 { background: #3b82f6; color: white; }

</style>

</head>

<body>

<header>
  <h1>🎮 Página Interativa</h1>
</header>

<section>

  <h2>Teste os botões</h2>

  <button class="btn1" onclick="mensagem()">Mostrar mensagem</button>
  <button class="btn2" onclick="mudarCor()">Mudar cor</button>
  <button class="btn3" onclick="voltarCor()">Voltar cor</button>

</section>

<script>
function mensagem() {
  alert("Você clicou no botão!");
}

function mudarCor() {
  document.body.style.backgroundColor = "#dbeafe";
}

function voltarCor() {
  document.body.style.backgroundColor = "#f1f5f9";
}
</script>

</body>
</html>
